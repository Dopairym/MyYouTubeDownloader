<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repo Explorer</title>
  <style>
    :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; --danger: #f85149; --border: #30363d; }
    body { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 1rem; }
    header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    input, button, select { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 0.5rem 0.75rem; border-radius: 6px; }
    button { cursor: pointer; }
    button:hover { opacity: 0.8; }
    .accent { background: var(--accent); color: #fff; border: none; }
    .danger { background: var(--danger); color: #fff; border: none; }
    .item { display: flex; align-items: center; padding: 0.5rem; border-bottom: 1px solid var(--border); gap: 0.5rem; }
    .item:hover { background: #1c2128; }
    .name { flex: 1; word-break: break-word; }
    .actions { display: flex; gap: 0.5rem; }
    video { max-width: 100%; background: #000; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <header>
    <h2>📁 My Repo Files</h2>
    <button onclick="logout()" class="danger">Logout</button>
  </header>

  <div id="authSection">
    <label>GitHub Token: <input type="password" id="tokenInput" placeholder="ghp_..."></label>
    <button onclick="saveToken()" class="accent">Login</button>
  </div>

  <div id="mainSection" class="hidden">
    <div style="display:flex; gap:0.5rem; margin-bottom:1rem;">
      <button onclick="navigate('..')">⬆ Up</button>
      <input id="path" type="text" placeholder="folder/subfolder/" style="flex:1;" />
      <button onclick="navigateToPath()" class="accent">Go</button>
      <button onclick="newFolder()">📂 New Folder</button>
      <input type="file" id="uploadInput" style="display:none" onchange="uploadFile(this.files)" />
      <button onclick="document.getElementById('uploadInput').click()">⬆ Upload</button>
    </div>

    <div id="playerContainer" class="hidden">
      <video id="videoPlayer" controls></video>
      <button onclick="closePlayer()">Close Player</button>
    </div>

    <div id="explorer"></div>
  </div>

  <script>
    // ======================== CONFIG ========================
    const owner = 'Dopairym';      // e.g. 'torvalds'
    const repo = 'MyYouTubeDownloader';            // e.g. 'MyDownloads'
    const defaultBranch = 'main';             // or 'master'
    // =======================================================

    let token = localStorage.getItem('gh_token');
    let currentPath = '';

    if (token) {
      document.getElementById('authSection').classList.add('hidden');
      document.getElementById('mainSection').classList.remove('hidden');
      navigate('');
    }

    function saveToken() {
      const t = document.getElementById('tokenInput').value.trim();
      if (!t) return alert('Paste your token.');
      localStorage.setItem('gh_token', t);
      token = t;
      document.getElementById('authSection').classList.add('hidden');
      document.getElementById('mainSection').classList.remove('hidden');
      navigate('');
    }

    function logout() {
      localStorage.removeItem('gh_token');
      token = null;
      location.reload();
    }

    async function api(endpoint, method = 'GET', body = null) {
      const headers = {
        'Authorization': `token ${token}`,
        'Accept': 'application/vnd.github.v3+json'
      };
      if (body) headers['Content-Type'] = 'application/json';
      const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/${endpoint}`, {
        method, headers, body: body ? JSON.stringify(body) : null
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `HTTP ${res.status}`);
      }
      if (res.status === 204) return null;
      return res.json();
    }

    async function listDir(path) {
      if (path.startsWith('/')) path = path.slice(1);
      if (path && !path.endsWith('/')) path += '/';
      const tree = await api(`git/trees/${defaultBranch}?recursive=1`);
      const prefix = path;
      const items = tree.tree.filter(item => {
        if (prefix && !item.path.startsWith(prefix)) return false;
        if (prefix && item.path === prefix) return false;
        const relative = prefix ? item.path.slice(prefix.length) : item.path;
        return !relative.includes('/');
      });
      renderList(items, prefix);
    }

    async function deleteFile(path) {
      const item = await api(`contents/${path}`);
      await api(`contents/${path}`, 'DELETE', {
        message: `Delete ${path}`,
        sha: item.sha
      });
      navigate(currentPath);
    }

    function renderList(items, prefix) {
      const explorer = document.getElementById('explorer');
      explorer.innerHTML = '';
      const folders = items.filter(i => i.type === 'tree').sort((a,b)=>a.path.localeCompare(b.path));
      const files = items.filter(i => i.type === 'blob').sort((a,b)=>a.path.localeCompare(b.path));
      for (const item of [...folders, ...files]) {
        const div = document.createElement('div');
        div.className = 'item';
        const icon = item.type === 'tree' ? '📁' : '📄';
        const name = prefix ? item.path.slice(prefix.length) : item.path;
        div.innerHTML = `<span class="name">${icon} ${name}</span>`;
        const actions = document.createElement('div');
        actions.className = 'actions';
        if (item.type === 'tree') {
          const openBtn = document.createElement('button');
          openBtn.textContent = 'Open';
          openBtn.onclick = () => navigate(prefix + name);
          actions.appendChild(openBtn);
        } else {
          const dlBtn = document.createElement('button');
          dlBtn.textContent = 'Download';
          dlBtn.onclick = () => window.open(`https://raw.githubusercontent.com/${owner}/${repo}/${defaultBranch}/${item.path}`, '_blank');
          actions.appendChild(dlBtn);
          if (/\.(mp4|webm|ogg|m4v|mkv|mov)$/i.test(name)) {
            const playBtn = document.createElement('button');
            playBtn.textContent = '▶ Play';
            playBtn.onclick = () => {
              const player = document.getElementById('videoPlayer');
              player.src = `https://raw.githubusercontent.com/${owner}/${repo}/${defaultBranch}/${item.path}`;
              document.getElementById('playerContainer').classList.remove('hidden');
              player.play();
            };
            actions.appendChild(playBtn);
          }
        }
        const delBtn = document.createElement('button');
        delBtn.textContent = 'Delete';
        delBtn.className = 'danger';
        delBtn.onclick = () => { if (confirm(`Delete ${name}?`)) deleteFile(item.path); };
        actions.appendChild(delBtn);
        div.appendChild(actions);
        explorer.appendChild(div);
      }
    }

    function navigate(dir) {
      if (dir === '..') {
        const parts = currentPath.replace(/\/$/, '').split('/');
        parts.pop();
        currentPath = parts.join('/') + (parts.length ? '/' : '');
      } else {
        currentPath = dir;
      }
      document.getElementById('path').value = currentPath;
      listDir(currentPath);
    }

    function navigateToPath() {
      currentPath = document.getElementById('path').value;
      listDir(currentPath);
    }

    async function newFolder() {
      const name = prompt('Folder name:');
      if (!name) return;
      const fullPath = currentPath ? `${currentPath}${name}/.gitkeep` : `${name}/.gitkeep`;
      await api(`contents/${fullPath}`, 'PUT', {
        message: `Create folder ${name}`,
        content: btoa('')
      });
      navigate(currentPath);
    }

    async function uploadFile(fileList) {
      for (const file of fileList) {
        const reader = new FileReader();
        reader.onload = async (e) => {
          const content = e.target.result.split(',')[1];
          const fullPath = currentPath ? `${currentPath}${file.name}` : file.name;
          await api(`contents/${fullPath}`, 'PUT', {
            message: `Upload ${file.name}`,
            content: content
          });
          navigate(currentPath);
        };
        reader.readAsDataURL(file);
      }
    }

    function closePlayer() {
      const player = document.getElementById('videoPlayer');
      player.pause();
      player.src = '';
      document.getElementById('playerContainer').classList.add('hidden');
    }
  </script>
</body>
</html>
