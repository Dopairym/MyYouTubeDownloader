name: Delete Files from List

on:
  workflow_dispatch:    # manual trigger only

jobs:
  delete-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Delete files and clear todelete.txt
        run: |
          LISTFILE="todelete.txt"

          if [ ! -f "$LISTFILE" ]; then
            echo "Error: $LISTFILE not found. Nothing to delete."
            exit 1
          fi

          # Read the folder path from line 1
          FOLDER=$(head -n 1 "$LISTFILE" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "$FOLDER" ]; then
            echo "Error: No folder path on first line."
            exit 1
          fi

          echo "Base folder: $FOLDER"

          count=0
          # Process lines 2..end – each is a filename relative to FOLDER
          tail -n +2 "$LISTFILE" | while IFS= read -r filename; do
            # Trim whitespace, skip empty lines and comments
            filename=$(echo "$filename" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            [[ -z "$filename" || "$filename" =~ ^# ]] && continue

            # Build full path
            fullpath="$FOLDER/$filename"

            if git ls-files --error-unmatch "$fullpath" &>/dev/null; then
              git rm "$fullpath"
              echo "Removed: $fullpath"
              count=$((count + 1))
            else
              echo "Skipping (not tracked): $fullpath"
            fi
          done

          echo "Deleted $count files."

          # Clear the list file completely
          > "$LISTFILE"

      - name: Commit deletions and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "Delete listed files and clear todelete.txt" || echo "Nothing to commit"
          git push
