name: Archive Folder to ZIP

on:
  workflow_dispatch:   # manual trigger only

jobs:
  zipfolder:
    runs-on: ubuntu-latest
    permissions:
      contents: read    # no push needed – we use artifacts instead

    steps:
      - name: Checkout repository (with LFS files)
        uses: actions/checkout@v4
        with:
          lfs: true      # download real LFS files, not pointers

      - name: Read folder path and create ZIP
        id: zip
        run: |
          TOARCHIVE="toarchive.txt"

          if [ ! -f "$TOARCHIVE" ]; then
            echo "Error: $TOARCHIVE not found in repo root. Create it first."
            exit 1
          fi

          # Read the first line – the folder path
          FOLDER=$(head -n 1 "$TOARCHIVE" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "$FOLDER" ]; then
            echo "Error: First line of $TOARCHIVE is empty."
            exit 1
          fi

          if [ ! -d "$FOLDER" ]; then
            echo "Error: Folder '$FOLDER' does not exist in the repository."
            exit 1
          fi

          echo "Archiving: $FOLDER"

          # Folder name for the top-level entry inside the ZIP
          FOLDERNAME=$(basename "$FOLDER")
          ZIPFILE="${FOLDERNAME}.zip"

          # Go into the parent directory so the ZIP has exactly "${FOLDERNAME}/" at the top
          cd "$(dirname "$FOLDER")"
          zip -rq "../../$ZIPFILE" "$FOLDERNAME"
          cd -

          echo "Created $ZIPFILE"
          echo "ZIPFILE=$ZIPFILE" >> $GITHUB_ENV
          echo "FOLDERNAME=$FOLDERNAME" >> $GITHUB_ENV

      - name: Upload ZIP as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ env.FOLDERNAME }}"
          path: "${{ env.ZIPFILE }}"
          retention-days: 30   # keep for 30 days (default is 90, max 90)
