name: Create File List

on:
  workflow_dispatch:    # manual trigger only

jobs:
  create-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate file list from folder
        id: generate
        run: |
          LISTFILE="todelete.txt"

          if [ ! -f "$LISTFILE" ]; then
            echo "Error: $LISTFILE not found in repository root."
            echo "Create it and put the folder path on line 1, e.g.: archive/images"
            exit 1
          fi

          # Read folder path from first line
          FOLDER=$(head -n 1 "$LISTFILE" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')

          if [ -z "$FOLDER" ]; then
            echo "Error: First line of $LISTFILE is empty."
            exit 1
          fi

          if [ ! -d "$FOLDER" ]; then
            echo "Error: Folder '$FOLDER' does not exist in the repo."
            exit 1
          fi

          echo "Listing files inside: $FOLDER"

          # Write folder as header
          echo "$FOLDER" > "$LISTFILE"
          # Append only filenames (relative to the folder)
          # Uses GNU find -printf, fallback uses sed for portability
          if find "$FOLDER" -type f -printf '%P\n' 2>/dev/null; then
            find "$FOLDER" -type f -printf '%P\n' | sort >> "$LISTFILE"
          else
            find "$FOLDER" -type f | sed "s|^$FOLDER/||" | sort >> "$LISTFILE"
          fi

          echo "Created list:"
          cat "$LISTFILE"
          echo "FOLDER=$FOLDER" >> $GITHUB_OUTPUT

      - name: Commit and push the list
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add todelete.txt
          git commit -m "Update file list for ${{ steps.generate.outputs.FOLDER }}" || echo "No changes"
          git push
