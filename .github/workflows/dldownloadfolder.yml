name: Instant delete downloads folder (no checkout)

on:
  workflow_dispatch:

jobs:
  delete-folder-via-api:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push the new commit
    steps:
      - name: Delete the downloads folder using the GitHub API
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}   # or hardcode e.g. 'main'
        run: |
          # 1. Get the current commit SHA of the branch
          SHA=$(gh api repos/$REPO/branches/$BRANCH --jq '.commit.sha')
          echo "Current commit: $SHA"

          # 2. Get the full tree recursively
          TREE_DATA=$(gh api repos/$REPO/git/trees/$SHA?recursive=1)

          # 3. Filter out any entries under the "downloads" folder
          #    (including subfolders and files)
          NEW_TREE=$(echo "$TREE_DATA" | jq '.tree | map(select(.path | startswith("downloads/") | not))')

          # 4. Create a new tree object from the filtered entries
          NEW_TREE_SHA=$(gh api repos/$REPO/git/trees \
            --field "tree=$(echo "$NEW_TREE" | jq -c .)" \
            --jq '.sha')
          echo "New tree SHA: $NEW_TREE_SHA"

          # 5. Create a commit that points to the new tree
          NEW_COMMIT_SHA=$(gh api repos/$REPO/git/commits \
            --field "message=Remove downloads folder" \
            --field "tree=$NEW_TREE_SHA" \
            --field "parents[]=$SHA" \
            --jq '.sha')
          echo "New commit SHA: $NEW_COMMIT_SHA"

          # 6. Update the branch reference to the new commit
          gh api repos/$REPO/git/refs/heads/$BRANCH \
            --field "sha=$NEW_COMMIT_SHA" \
            --field "force=false"
          echo "Branch $BRANCH updated. downloads/ folder removed."
