name: Archive Folder to Release

on:
  workflow_dispatch:
    inputs:
      folder:
        description: 'Folder path to archive (e.g., archive/SOaDMezmerize)'
        required: true
        type: string

jobs:
  zip-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to manage releases and assets

    steps:
      - name: Checkout repository (with LFS files)
        uses: actions/checkout@v4
        with:
          lfs: true         # fetch real binary files, not LFS pointers

      - name: Create ZIP
        id: zip
        run: |
          FOLDER="${{ github.event.inputs.folder }}"

          if [ -z "$FOLDER" ]; then
            echo "Error: No folder path provided."
            exit 1
          fi

          if [ ! -d "$FOLDER" ]; then
            echo "Error: Folder '$FOLDER' does not exist in the repository."
            exit 1
          fi

          echo "Archiving: $FOLDER"

          FOLDERNAME=$(basename "$FOLDER")
          ZIPFILE="${FOLDERNAME}.zip"

          # Create ZIP with exactly one top-level folder (the folder name)
          cd "$(dirname "$FOLDER")"
          zip -rq "../../$ZIPFILE" "$FOLDERNAME"
          cd -

          ls -lh "$ZIPFILE"
          echo "ZIPFILE=$ZIPFILE" >> $GITHUB_ENV
          echo "FOLDERNAME=$FOLDERNAME" >> $GITHUB_ENV

      - name: Upload ZIP to the persistent 'Archives' release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: archives        # permanent release (created automatically on first run)
          name: "Archives"          # release title
          body: |
            Collection of ZIP archives generated on demand.
            Latest addition: **${{ env.FOLDERNAME }}** (run ${{ github.run_id }})
          files: ${{ env.ZIPFILE }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
