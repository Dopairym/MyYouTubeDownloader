name: 🚀 Deploy File Manager

on:
  workflow_dispatch:
  push:
    paths:
      - 'index.html'

# ✅ These permissions are mandatory
permissions:
  contents: read          # to read the repo
  pages: write            # to deploy to Pages
  id-token: write         # for GitHub's OIDC token

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ✅ This step is required – it sets up the Pages environment
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'        # upload everything from repo root

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
